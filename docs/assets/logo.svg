<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 52" role="img" aria-label="kutsu">
  <defs>
    <style>
      .mark { stroke: #2563eb; fill: none; stroke-width: 5.5; stroke-linecap: round; }
      .dot  { fill: #2563eb; }
      .word { fill: #111827; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; font-size: 40px; font-weight: 650; letter-spacing: -0.03em; }
      @media (prefers-color-scheme: dark) {
        .word { fill: #f3f4f6; }
        .mark { stroke: #60a5fa; }
        .dot  { fill: #60a5fa; }
      }
    </style>
  </defs>
  <!-- outbound call mark: origin dot with ripples radiating out -->
  <circle class="dot" cx="8" cy="43" r="4.5"/>
  <path class="mark" d="M8 30 A13 13 0 0 1 21 43"/>
  <path class="mark" d="M8 19 A24 24 0 0 1 32 43" opacity="0.65"/>
  <path class="mark" d="M8 8 A35 35 0 0 1 43 43" opacity="0.4"/>
  <text class="word" x="52" y="40">kutsu</text>
</svg>
